<!doctype html>
<html>
<head>
<title>Registration form</title>
</head>
<body>
<h1>Register Here</h1>
<border>
<table cellpadding="10">
<tr>
<td><center><label>First Name</label>
<input type="enter your Surname/First name" required pattern="[a-zA-Z]"></center></td>
</tr>
<tr>
<div>
<td><label>Username</label>
<input type="text" placeholder="enter username" required pattern="[a-zA-Z]{6,15}"></td>
</div>
</tr>
<div>
<tr>
<td><label>Password</label>
<input type="password" placeholder="enter password" required pattern="[^0-9]{8}"></td>
</tr>
</div>
<div>
<tr>
<td><label>Mobile Number</label>
<input type="numbers" placeholder="enter your 10digit mobile number" required pattern="[7-9]{1}[0-9]{9}"></td>
</tr>
</div>
<div>
<tr>
<td><label>Gender</label>
<input type="radio" name="Men">Straight
<input type="radio" name="Men">Gay
<input type="radio" name="Men">LGBTQ
</td>
</tr>
</div>
<div>
<tr>
<td><label>Email ID</label>
<input type="email" placeholder="enter your email"></td>
</tr>
</div>
<div>
<tr>
<td><label>Resume</label>
<input type="file"></td>
</tr>
</div>
<div>
<tr>
<td><input type="submit" value="Register">
<input type="reset" value="cancel"></td>
</tr>
</div>
</center>
</body>
</html>
